name: Nova Ideia / Feature Request
description: Sugira uma nova ferramenta ou melhoria para o DevUtils
title: "[Ideia]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tem uma ideia para tornar o DevUtils mais útil? Adoramos sugestões!

  - type: dropdown
    id: type
    attributes:
      label: Tipo de sugestão
      options:
        - Nova ferramenta
        - Melhoria em ferramenta existente
        - Melhoria na interface
        - Performance
        - Outro
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Ferramenta relacionada (se aplicável)
      placeholder: Ex. JSON → SQL, Gerador de CPF

  - type: textarea
    id: problem
    attributes:
      label: Qual problema isso resolve?
      description: Descreva a necessidade ou dificuldade que motivou a ideia.
      placeholder: Ex. Preciso converter JSON para formato Markdown com frequência e hoje faço isso manualmente.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
      description: Descreva como você imagina que essa funcionalidade funcionaria.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Existe alguma solução alternativa que você usa hoje?

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Screenshots, referências, exemplos de ferramentas similares, etc.
